<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 820" width="1060" height="820" font-family="'Courier New', Courier, monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1060" height="820" fill="#f8fafc" rx="12"/>

  <!-- ═══════════════ TITLE ═══════════════ -->
  <text x="530" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e3a5f">GovLens MVP — System Architecture</text>
  <text x="530" y="60" text-anchor="middle" font-size="12" fill="#64748b">Next.js · Go (Chi) · Python FastAPI · PostgreSQL · Redis · NATS JetStream · Nginx</text>

  <!-- ═══════════════ TIER LABELS (left rail) ═══════════════ -->
  <text x="14" y="122" font-size="9" fill="#3b82f6" font-weight="bold" letter-spacing="1">CLIENT</text>
  <text x="14" y="220" font-size="9" fill="#3b82f6" font-weight="bold" letter-spacing="1">GATEWAY</text>
  <text x="14" y="370" font-size="9" fill="#3b82f6" font-weight="bold" letter-spacing="1">APP</text>
  <text x="14" y="560" font-size="9" fill="#3b82f6" font-weight="bold" letter-spacing="1">DATA</text>
  <text x="14" y="740" font-size="9" fill="#3b82f6" font-weight="bold" letter-spacing="1">OBSERVE</text>

  <!-- divider lines -->
  <line x1="70" y1="160" x2="990" y2="160" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="70" y1="265" x2="990" y2="265" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="70" y1="520" x2="990" y2="520" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="70" y1="690" x2="990" y2="690" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ═══════════════ CLIENT TIER ═══════════════ -->
  <rect x="130" y="80" width="730" height="72" rx="10" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
  <text x="495" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#c2410c">Next.js Frontend</text>
  <text x="495" y="128" text-anchor="middle" font-size="12" fill="#7c3c1f">SSR + CSR  ·  React Query  ·  Axios  ·  Browser Cache  ·  Service Worker</text>
  <text x="495" y="146" text-anchor="middle" font-size="11" fill="#92400e">Deployed on Vercel / self-hosted Node</text>

  <!-- CLIENT → NGINX arrow -->
  <line x1="495" y1="152" x2="495" y2="186" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="173" font-size="10" fill="#475569">HTTPS</text>

  <!-- ═══════════════ GATEWAY TIER ═══════════════ -->
  <rect x="130" y="187" width="730" height="70" rx="10" fill="#1e3a5f" stroke="#0f1f3d" stroke-width="2"/>
  <text x="495" y="211" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Nginx  —  API Gateway / Reverse Proxy</text>
  <text x="495" y="229" text-anchor="middle" font-size="12" fill="#93c5fd">Rate Limiting  ·  TLS Termination  ·  Load Balancing</text>
  <text x="495" y="247" text-anchor="middle" font-size="11" fill="#bfdbfe">/api/v1/*  →  Go API :8000      /ml/*  →  ML Sidecar :8001</text>

  <!-- NGINX → Go arrow -->
  <line x1="340" y1="257" x2="300" y2="305" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- NGINX → ML arrow -->
  <line x1="650" y1="257" x2="700" y2="305" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════════ APPLICATION TIER ═══════════════ -->

  <!-- Go API box -->
  <rect x="130" y="306" width="390" height="200" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="130" y="306" width="390" height="32" rx="10" fill="#1d4ed8"/>
  <rect x="130" y="326" width="390" height="12" fill="#1d4ed8"/>
  <text x="325" y="328" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Go REST API  (Chi Router)  :8000</text>

  <text x="155" y="360" font-size="12" fill="#1e3a5f" font-weight="bold">Request Flow:</text>
  <text x="155" y="378" font-size="11" fill="#374151">Router  →  Middleware  →  Handlers</text>
  <text x="155" y="394" font-size="11" fill="#374151">Service Layer  →  Repository Layer</text>
  <text x="155" y="414" font-size="12" fill="#1e3a5f" font-weight="bold">Stack:</text>
  <text x="155" y="431" font-size="11" fill="#374151">pgx/v5 (PostgreSQL pool)</text>
  <text x="155" y="447" font-size="11" fill="#374151">go-redis/v9 (cache + sessions)</text>
  <text x="155" y="463" font-size="11" fill="#374151">nats.go (publish events)</text>
  <text x="155" y="479" font-size="11" fill="#374151">slog  ·  OpenTelemetry</text>
  <text x="155" y="495" font-size="11" fill="#374151">JWT auth  ·  bcrypt</text>

  <!-- ML Sidecar box -->
  <rect x="540" y="306" width="320" height="200" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="540" y="306" width="320" height="32" rx="10" fill="#7c3aed"/>
  <rect x="540" y="326" width="320" height="12" fill="#7c3aed"/>
  <text x="700" y="328" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">ML Sidecar  (FastAPI)  :8001</text>

  <text x="560" y="360" font-size="12" fill="#6d28d9" font-weight="bold">NLP Pipeline:</text>
  <text x="560" y="378" font-size="11" fill="#374151">spaCy  —  entity recognition</text>
  <text x="560" y="394" font-size="11" fill="#374151">VADER  —  sentiment analysis</text>
  <text x="560" y="410" font-size="11" fill="#374151">scikit-learn  —  classification</text>
  <text x="560" y="430" font-size="12" fill="#6d28d9" font-weight="bold">Workers:</text>
  <text x="560" y="447" font-size="11" fill="#374151">AsyncIO background tasks</text>
  <text x="560" y="463" font-size="11" fill="#374151">NATS consumer (ml.classify)</text>
  <text x="560" y="479" font-size="11" fill="#374151">Results → PostgreSQL</text>
  <text x="560" y="495" font-size="11" fill="#374151">Prometheus /metrics endpoint</text>

  <!-- Go → PostgreSQL arrow -->
  <line x1="240" y1="506" x2="210" y2="548" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <!-- Go → Redis arrow -->
  <line x1="325" y1="506" x2="490" y2="548" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <!-- Go → NATS arrow -->
  <line x1="390" y1="506" x2="695" y2="548" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <!-- NATS → ML arrow (dashed, async) -->
  <line x1="730" y1="548" x2="700" y2="506" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow-purple)"/>
  <text x="738" y="532" font-size="10" fill="#7c3aed">async</text>

  <!-- ═══════════════ DATA + MESSAGING TIER ═══════════════ -->

  <!-- PostgreSQL -->
  <rect x="90" y="549" width="250" height="130" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <rect x="90" y="549" width="250" height="28" rx="10" fill="#15803d"/>
  <rect x="90" y="565" width="250" height="12" fill="#15803d"/>
  <text x="215" y="568" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">PostgreSQL</text>
  <text x="110" y="598" font-size="11" fill="#14532d">Primary node  (read + write)</text>
  <text x="110" y="614" font-size="11" fill="#14532d">Read replica  (analytics / ML)</text>
  <text x="110" y="630" font-size="11" fill="#14532d">GiST spatial indexes</text>
  <text x="110" y="646" font-size="11" fill="#14532d">Row-level security (RLS)</text>
  <text x="110" y="662" font-size="11" fill="#14532d">goose migrations</text>

  <!-- Redis -->
  <rect x="370" y="549" width="240" height="130" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <rect x="370" y="549" width="240" height="28" rx="10" fill="#d97706"/>
  <rect x="370" y="565" width="240" height="12" fill="#d97706"/>
  <text x="490" y="568" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Redis</text>
  <text x="388" y="598" font-size="11" fill="#78350f">API response cache</text>
  <text x="388" y="614" font-size="11" fill="#78350f">Session store  (JWT refresh)</text>
  <text x="388" y="630" font-size="11" fill="#78350f">Rate-limit counters</text>
  <text x="388" y="646" font-size="11" fill="#78350f">Token-bucket  (multi-plan)</text>
  <text x="388" y="662" font-size="11" fill="#78350f">Pub/Sub for cache.bust</text>

  <!-- NATS -->
  <rect x="640" y="549" width="270" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="640" y="549" width="270" height="28" rx="10" fill="#2563eb"/>
  <rect x="640" y="565" width="270" height="12" fill="#2563eb"/>
  <text x="775" y="568" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">NATS JetStream</text>
  <text x="658" y="598" font-size="11" fill="#1e3a5f">issue.created    →  ML classify</text>
  <text x="658" y="614" font-size="11" fill="#1e3a5f">ml.classify       →  ML sidecar</text>
  <text x="658" y="630" font-size="11" fill="#1e3a5f">notify.send      →  notif service</text>
  <text x="658" y="646" font-size="11" fill="#1e3a5f">cache.bust        →  Redis flush</text>
  <text x="658" y="662" font-size="11" fill="#1e3a5f">At-least-once delivery</text>

  <!-- Data → Observability arrows -->
  <line x1="215" y1="679" x2="380" y2="716" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="679" x2="490" y2="716" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="775" y1="679" x2="620" y2="716" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════ OBSERVABILITY TIER ═══════════════ -->
  <rect x="130" y="717" width="730" height="72" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="495" y="742" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">Observability Stack</text>
  <text x="495" y="761" text-anchor="middle" font-size="12" fill="#374151">Prometheus  ·  Grafana dashboards  ·  slog structured logging  ·  OpenTelemetry traces</text>
  <text x="495" y="779" text-anchor="middle" font-size="11" fill="#374151">Alertmanager  ·  Error budgets  ·  SLO dashboards</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <rect x="880" y="306" width="168" height="200" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="964" y="326" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">Legend</text>

  <line x1="896" y1="344" x2="930" y2="344" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="936" y="348" font-size="10" fill="#374151">Sync HTTP</text>

  <line x1="896" y1="364" x2="930" y2="364" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-purple)"/>
  <text x="936" y="368" font-size="10" fill="#374151">Async NATS</text>

  <rect x="896" y="380" width="14" height="10" fill="#fff7ed" stroke="#c2410c" stroke-width="1.5"/>
  <text x="916" y="390" font-size="10" fill="#374151">Client / Entry</text>

  <rect x="896" y="398" width="14" height="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="916" y="408" font-size="10" fill="#374151">Go Services</text>

  <rect x="896" y="416" width="14" height="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="916" y="426" font-size="10" fill="#374151">AI / ML Layer</text>

  <rect x="896" y="434" width="14" height="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="916" y="444" font-size="10" fill="#374151">Data / Storage</text>

  <rect x="896" y="452" width="14" height="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="916" y="462" font-size="10" fill="#374151">Cache</text>

  <rect x="896" y="470" width="14" height="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="916" y="480" font-size="10" fill="#374151">Messaging</text>

  <!-- timestamp -->
  <text x="1050" y="814" text-anchor="end" font-size="9" fill="#94a3b8">GovLens MVP · 2026-03</text>
</svg>
