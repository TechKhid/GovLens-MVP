version: '3.8'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: govlens
      POSTGRES_PASSWORD: password
      POSTGRES_DB: govlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"     # HTTP monitoring endpoint
    command: "-js -m 8222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application services ────────────────────────────────────────────────
  migrate:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./backend/migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://govlens:password@postgres:5432/govlens?sslmode=disable
      up
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  seed:
    image: postgres:16-alpine
    volumes:
      - ./backend/seed.sql:/seed.sql:ro
    command: psql postgres://govlens:password@postgres:5432/govlens -f /seed.sql
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  go-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://govlens:password@postgres:5432/govlens?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - JWT_SECRET=supersecret-change-in-production
      - ML_SIDECAR_URL=http://ml-sidecar:8001
      - PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  ml-sidecar:
    build:
      context: ./ml_sidecar
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_URL=postgresql://govlens:password@postgres:5432/govlens
      - NATS_URL=nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - go-api
      - ml-sidecar
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  natsdata:
